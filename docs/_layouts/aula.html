---
layout: default
---

{% include lang.html %}

<article class="px-1">
    <h1 class="dynamic-title">
        {{ page.title }}
    </h1>
    <div class="content">
        {{ content }}

        <hr>

        {% if page.slides %}
        <h2>🎞️ Slides da Aula</h2>
        <div class="slide-container"
            style="position: relative; width: 100%; height: 0; padding-bottom: 56.25%; margin-bottom: 2rem;">
            <iframe src="{{ site.baseurl }}/slides/{{ page.slides }}" frameborder="0" allowfullscreen
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
        </div>
        {% endif %}

        <div class="lesson-navigation" style="display: flex; gap: 1rem; margin-top: 2rem;">
            {% if page.quiz %}
            <a href="{{ site.baseurl }}/quizzes/{{ page.quiz }}" class="btn btn-outline-primary">🧠 Quiz</a>
            {% endif %}
            {% if page.exercicios %}
            <a href="{{ site.baseurl }}/exercicios/{{ page.exercicios }}" class="btn btn-outline-secondary">📝
                Exercícios</a>
            {% endif %}
            {% if page.projeto %}
            <a href="{{ site.baseurl }}/projetos/{{ page.projeto }}" class="btn btn-outline-success">🚀 Projeto</a>
            {% endif %}
        </div>

    </div>
</article>
